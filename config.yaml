app:
  host: "0.0.0.0"
  port: 8088

datasources:
  - name: "REDACTED"
    prometheus:
      url: "REDACTED"
      timeout: 30s
      use_deployment_aggregation: true
    signoz:
      url: "REDACTED"
      user: "default"
      password: "REDACTED" # Fill out your ClickHouse password here
      timeout: 30s
      database: "signoz_traces"
      env_tag: "dev"
    gcloud:
      project_id: "REDACTED"
      env_version_tag: "develop"
      profiler_enabled: false
    namespaces:
      - "REDACTED"
    deploy_exclude_patterns:
      - "^kube-"
      - "^system-"

  - name: "REDACTED"
    prometheus:
      url: "REDACTED"
      timeout: 30s
      use_deployment_aggregation: true
    signoz:
      url: "REDACTED"
      user: "default"
      password: "REDACTED"
      timeout: 30s
      database: "signoz_traces"
      env_tag: "prod"
    gcloud:
      project_id: "REDACTED"
      env_version_tag: "v"
      profiler_enabled: false
    namespaces:
      - "fundii"
    deploy_exclude_patterns:
      - "^kube-"
      - "^system-"

detection:
  cpu_threshold: 80
  memory_threshold: 85
  polling_interval_seconds: 30
  moving_average_window_minutes: 30
  baseline_learning_period_minutes: 5
  reconciliation_buffer_minutes: 8
  cooldown_minutes: 15

timeline:
  cpu_close_to_100_threshold: 85
  cpu_far_below_100_threshold: 50

discord:
  enabled: true
  webhook_url: "REDACTED"

database:
  type: "sqlite"
  path: "./data/trace-point.db"


